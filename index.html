<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habiterm — Habit Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%236c5ce7'/%3E%3Cpath d='M4.2 8.6l2.6 2.6 5-5.6' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/terminal.css">
</head>
<body data-acc="violet" data-theme="light">
<div id="shell">

  <header id="topbar">
    <div id="logo" data-cmd="DASH" title="Habiterm — your habits, beautifully tracked"><span class="logo-mark">✓</span><span>Habiterm</span><span class="ver">v1.0</span></div>
    <nav id="nav">
      <button class="navchip" data-cmd="DASH"  data-panel="dash"  title="Home (F1)">Home</button>
      <button class="navchip" data-cmd="TODAY" data-panel="today" title="Today's habits (F2)">Today</button>
      <button class="navchip" data-cmd="CAL"   data-panel="cal"   title="Calendar (F3)">Calendar</button>
      <button class="navchip" data-cmd="RPT"   data-panel="rpt"   title="Stats (F4)">Stats</button>
      <button class="navchip" data-cmd="GRADE" data-panel="grade" title="Report card (F6)">Grades</button>
      <button class="navchip" data-cmd="RES"   data-panel="res"   title="Research & ideas (F7)">Discover</button>
      <button class="navchip" data-cmd="HAB"   data-panel="hab"   title="All habits (F8)">Habits</button>
    </nav>
    <div id="topbar-right">
      <button class="btn btn-acc" data-cmd="ADD" title="Add a new habit">+ New habit</button>
      <button class="btn" data-cmd="PREMIUM" title="Habiterm Premium">👑</button>
      <button class="btn" data-cmd="SET" title="Settings (F9)">⚙</button>
      <button class="btn" data-cmd="HELP" title="Help (F10)">?</button>
    </div>
  </header>

  <div id="cmdbar">
    <span class="cmd-prompt">🔍</span>
    <input id="cmd" autocomplete="off" spellcheck="false" placeholder="Search habits or type a command — try &quot;help&quot;">
    <span id="cmd-go" title="Press / to jump here">/</span>
    <div id="palette" class="hidden"></div>
  </div>

  <div id="msgline" class="hidden"></div>

  <main id="main"></main>

</div>

<input type="file" id="importfile" accept=".json,application/json" class="hidden">

<script src="js/util.js"></script>
<script src="js/store.js"></script>
<script src="js/premium.js"></script>
<script src="js/topics.js"></script>
<script src="js/metrics.js"></script>
<script src="js/charts.js"></script>
<script src="js/feed.js"></script>
<script src="js/panels/today.js"></script>
<script src="js/panels/dashboard.js"></script>
<script src="js/panels/calendar.js"></script>
<script src="js/panels/report.js"></script>
<script src="js/panels/grade.js"></script>
<script src="js/panels/research.js"></script>
<script src="js/panels/habit.js"></script>
<script src="js/panels/manage.js"></script>
<script src="js/command.js"></script>
<script src="js/app.js"></script>
</body>
</html>
