<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HABITERM — Habit Intelligence Terminal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23070708'/%3E%3Crect x='2' y='6' width='3' height='8' fill='%23ffb000'/%3E%3Crect x='6.5' y='3' width='3' height='11' fill='%23ffb000'/%3E%3Crect x='11' y='8' width='3' height='6' fill='%23ffb000'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/terminal.css">
</head>
<body data-acc="amber" class="scanlines">
<div id="shell">

  <header id="topbar">
    <div id="logo" data-cmd="DASH" title="HABITERM — Habit Intelligence Terminal">▮▮<span>HABITERM</span><span class="ver">v1.0</span></div>
    <nav id="nav">
      <button class="navchip" data-cmd="DASH"  data-panel="dash"  title="Dashboard [F1]">DASH</button>
      <button class="navchip" data-cmd="TODAY" data-panel="today" title="Today's book [F2]">TODAY</button>
      <button class="navchip" data-cmd="CAL"   data-panel="cal"   title="Calendar [F3]">CAL</button>
      <button class="navchip" data-cmd="RPT"   data-panel="rpt"   title="Performance report [F4]">RPT</button>
      <button class="navchip" data-cmd="GRADE" data-panel="grade" title="Report card [F6]">GRADE</button>
      <button class="navchip" data-cmd="RES"   data-panel="res"   title="Research terminal [F7]">RES</button>
      <button class="navchip" data-cmd="HAB"   data-panel="hab"   title="Securities list [F8]">HAB</button>
    </nav>
    <div id="topbar-right">
      <button class="btn btn-acc" data-cmd="ADD" title="List a new habit">+ LIST HABIT</button>
      <button class="btn" data-cmd="SET" title="Settings [F9]">SET</button>
      <button class="btn" data-cmd="HELP" title="Help [F10]">?</button>
    </div>
  </header>

  <div id="cmdbar">
    <span class="cmd-prompt">&gt;</span>
    <input id="cmd" autocomplete="off" spellcheck="false" placeholder="TYPE A COMMAND, THEN ENTER — TRY: HELP · ADD · DONE MEDT · RES">
    <span id="cmd-go">&lt;GO&gt;</span>
    <div id="palette" class="hidden"></div>
  </div>

  <div id="msgline" class="hidden"></div>

  <div id="ticker"><div id="ticker-track"></div></div>

  <main id="main"></main>

  <footer id="statusbar">
    <div id="sb-left"></div>
    <div id="sb-mid"></div>
    <div id="sb-right"></div>
  </footer>

</div>

<input type="file" id="importfile" accept=".json,application/json" class="hidden">

<script src="js/util.js"></script>
<script src="js/store.js"></script>
<script src="js/metrics.js"></script>
<script src="js/charts.js"></script>
<script src="js/feed.js"></script>
<script src="js/panels/today.js"></script>
<script src="js/panels/dashboard.js"></script>
<script src="js/panels/calendar.js"></script>
<script src="js/panels/report.js"></script>
<script src="js/panels/grade.js"></script>
<script src="js/panels/research.js"></script>
<script src="js/panels/habit.js"></script>
<script src="js/panels/manage.js"></script>
<script src="js/command.js"></script>
<script src="js/app.js"></script>
</body>
</html>
